name: Build LegionCore

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: ./scripts/setup-deps-linux.sh
      - name: Build
        run: |
          chmod +x scripts/build.sh
          INSTALL_DIR="$GITHUB_WORKSPACE/install" ./scripts/build.sh
      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: legioncore-linux
          path: install/bin

  build-macos:
    # Intel runner: LegionCore's bundled deps (g3dlite, CascLib, SSE intrinsics) require x86_64.
    # On Apple Silicon, build under Rosetta 2 with x86_64 Homebrew (see docs/BUILDING.md).
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: ./scripts/setup-deps-macos.sh
      - name: Build
        run: |
          chmod +x scripts/build.sh
          INSTALL_DIR="$GITHUB_WORKSPACE/install" ./scripts/build.sh
      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: legioncore-macos
          path: install/bin
